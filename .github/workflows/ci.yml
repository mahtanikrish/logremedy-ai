name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev,web]"
      - name: CLI smoke
        run: |
          python -m gha_remediator --help
          python -m gha_remediator.web_app --help
      - name: Run pytest
        run: pytest -q

  frontend-and-web-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python package
        run: pip install -e ".[web]"
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run frontend tests
        run: npm test -- --test-reporter=spec
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Smoke test Flask-served frontend
        run: |
          python -m gha_remediator.web_app --port 8001 &
          APP_PID=$!
          trap "kill $APP_PID" EXIT
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8001/api/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8001/api/health
          curl -fsS http://127.0.0.1:8001/ >/dev/null
